title: Mursel Ventures
description: "Blue Economy Venture Studio | Accelerator | Consulting | Fund. Named after Kara Mursel Alp, the first Ottoman Admiral, building the future of sustainable ocean innovation."
url: "https://murselventures.com"
baseurl: ""
permalink: "/:title/"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .local
  - README.md
  - replit.md
  - attached_assets

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

sass:
  style: compressed
